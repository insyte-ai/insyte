# Semantic layer for the ecommerce fixture, used by analytics tests and the demo.
entities:
  order:
    table: public.orders
    primary_key: id
    time_column: created_at
    confidence: 0.97

metrics:
  completed_revenue:
    label: Completed revenue
    expression: SUM(orders.total_amount)
    source_table: public.orders
    filters:
      orders.status:
        - completed
    time_column: orders.completed_at
    format: currency
    status: confirmed
    confidence: 0.9

  order_count:
    label: Order count
    expression: COUNT(DISTINCT orders.id)
    source_table: public.orders
    time_column: orders.created_at
    format: number
    status: confirmed
    confidence: 0.95

  payment_failure_rate:
    label: Payment failure rate
    expression: AVG(CASE WHEN payments.status = 'failed' THEN 1.0 ELSE 0.0 END)
    source_table: public.payments
    time_column: payments.created_at
    format: percent
    status: suggested
    confidence: 0.7

dimensions:
  city:
    source: cities.name
    type: categorical
  payment_method:
    source: payments.method
    type: categorical
